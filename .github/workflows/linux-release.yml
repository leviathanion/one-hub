name: Linux Release
permissions:
  contents: write

on:
  push:
    tags:
      - "*"
      - "!*-alpha*"
jobs:
  release:
    env:
      VERSION: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: yarn
          cache-dependency-path: web/yarn.lock
      - name: Build Frontend
        working-directory: web
        env:
          CI: ""
        run: |
          yarn install --prefer-offline --non-interactive
          VITE_APP_VERSION=$VERSION yarn build
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: go.sum
      - name: Build Backend (amd64)
        run: |
          go build -ldflags "-s -w -X 'one-api/common/config.Version=$VERSION' -extldflags '-static'" -o one-api

      - name: Install ARM64 cross-compiler
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
      - name: Build Backend (arm64)
        run: |
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'one-api/common/config.Version=$VERSION' -extldflags '-static'" -o one-api-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            one-api
            one-api-arm64
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GT_Token }}
